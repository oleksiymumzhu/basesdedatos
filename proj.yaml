services:
  mysql:
    image: mysql:latest
    command: --secure-file-priv=""
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=MasterPassword123!
    volumes:
      - ./data:/data
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data